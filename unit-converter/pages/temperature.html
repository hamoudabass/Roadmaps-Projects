
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>
    <h1>Unit Converter</h1>

    <div class="nav-bar">
        <a href="../index.html">Length</a>
        <a href="/pages/weight.html">Weight</a>
        <a href="#" class="active">Temperature</a>
    </div>

    <br>

    <form id="unitConvert">
        <label for="temperature">Enter length to convert :</label><br>
        <input type="number" name="temperature" id="temperature">
        
        <br>
        <br>

        <label for="unitToConvertFrom">Unit to convert from :</label><br>
        <select name="unitToConvertFrom" id="convertFrom">
            <option value="c">Celsius</option>
            <option value="f">Fahrenheit</option>
            <option value="k">Kelvin</option>
        </select>
        
        <br>
        <br>

        <label for="unitToConvertTo">Unit to convert to :</label><br>
        <select name="unitToConvertTo" id="convertTo">
            <option value="c">Celsius</option>
            <option value="f">Fahrenheit</option>
            <option value="k">Kelvin</option>
        </select>

        <br>
        <br>

        <input type="button" onclick="conversionTemperature()" value="Convert">

    <div id="conversion-result"></div>

    </form>

<footer>
   <p>© 2026 Unite Converter.</p> 
</footer>    
    
    <script src="../assets/js/script.js"></script>
</body>
</html>
