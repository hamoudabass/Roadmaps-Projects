{% extends "layout.html" %}
{% block content %}
   <div class="login-container">
        <form action="/login" id="login-form" method="POST">

            <h2 id="connexion-title">
                Connexion
            </h2>

            <input type="text" name="username" class="input"  placeholder="Username"><br>
            <input type="password" name="password" class="input" placeholder="Password"><br>

            <button type="submit" id="btn_submit">Connexion</button>

        </form>
   </div>
    
{% endblock content %}
