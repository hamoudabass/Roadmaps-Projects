{% extends "layout.html" %}
{% block content %}

    <h1>This is Home Page</h1>
    {% for article in articles %}
    <a href="{{ url_for('article_page', article_id = article.id) }}"> {{ article.title }} </a>
    <p>{{ article.content }}</p>
    <p>{{ article.published_at }}</p>
    {% endfor %}

{% endblock content %}
